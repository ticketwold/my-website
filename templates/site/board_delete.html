{% extends "site/base_site.html" %}
{% block title %}게시글 삭제{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container" style="max-width:700px;">
    <div class="bg-white border rounded-4 p-4 shadow-sm">

      <h3 class="fw-bold mb-3">게시글 삭제</h3>
      <p class="text-muted">아래 게시글을 삭제하시겠습니까?</p>

      <div class="border rounded-3 p-3 mb-4">
        <div class="fw-bold mb-2">{{ post.title }}</div>
        <div class="text-muted small">{{ post.created_at|date:"Y-m-d H:i" }}</div>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-end gap-2">
          <a href="{% url 'board_detail' board_type post.id %}" class="btn btn-outline-dark">취소</a>
          <button type="submit" class="btn btn-danger">삭제</button>
        </div>
      </form>

    </div>
  </div>
</section>
{% endblock %}
