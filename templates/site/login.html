{% extends "site/base_site.html" %}
{% block title %}로그인{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container" style="max-width:520px;">
    <div class="bg-white border rounded-4 p-4 shadow-sm">
      <h2 class="fw-bold mb-4 text-center">로그인</h2>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold">아이디</label>
          {{ form.username }}
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">비밀번호</label>
          {{ form.password }}
        </div>

        {% if form.errors %}
          <div class="text-danger small mb-3">
            아이디 또는 비밀번호를 확인해주세요.
          </div>
        {% endif %}

        <button type="submit" class="btn btn-dark w-100">로그인</button>
      </form>

      <div class="text-center mt-3">
        <a href="{% url 'signup' %}" class="text-decoration-none">회원가입</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
