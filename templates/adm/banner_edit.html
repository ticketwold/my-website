{% extends "adm/base.html" %}
{% block title %}배너 수정{% endblock %}
{% block breadcrumbs %}관리자 페이지 / 배너 관리 / 수정{% endblock %}
{% block page_title %}배너 수정{% endblock %}

{% block content %}
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">배너 수정</div>
      <a class="btnx" href="{% url 'adm_banner_list' %}">목록</a>
    </div>

    <div class="panel-body">
      <form method="post" enctype="multipart/form-data" class="form-row">
        {% csrf_token %}

        <div style="width:100%; display:grid; grid-template-columns:180px 1fr; gap:10px 14px;">
          <div class="fw">순서(sort)</div>
          <div><input class="inputx" name="sort" value="{{ banner.sort }}"></div>

          <div class="fw">제목</div>
          <div><input class="inputx" name="title" value="{{ banner.title }}"></div>

          <div class="fw">설명</div>
          <div><input class="inputx" name="desc" value="{{ banner.desc }}"></div>

          <div class="fw">링크</div>
          <div><input class="inputx" name="link_url" value="{{ banner.link_url }}"></div>

          <div class="fw">배경색</div>
          <div><input class="inputx" name="bg_color" value="{{ banner.bg_color }}"></div>

          <div class="fw">이미지</div>
          <div>
            {% if banner.image %}
              <div class="muted" style="margin-bottom:8px;">
                <img src="{{ banner.image.url }}" style="max-width:280px; border-radius:12px; border:1px solid var(--line);">
              </div>
            {% endif %}
            <input type="file" name="image">
          </div>

          <div class="fw">활성</div>
          <div>
            <label class="radiox">
              <input type="checkbox" name="is_active" {% if banner.is_active %}checked{% endif %}> 노출함
            </label>
          </div>
        </div>

        <div style="width:100%; display:flex; justify-content:flex-end; margin-top:12px;">
          <button class="btnx primary" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
