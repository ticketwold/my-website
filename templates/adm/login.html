{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ADMIN LOGIN</title>
  <link rel="stylesheet" href="{% static 'adm/css/adm.css' %}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-title">ADMINISTRATOR</div>
    <div class="login-desc">관리자 계정으로 로그인하세요.</div>

    {% if messages %}
      <div class="msg-wrap" style="margin-top:10px;">
        {% for m in messages %}
          <div class="msg {{ m.tags }}">{{ m }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="post" class="login-form">
      {% csrf_token %}
      <label>아이디</label>
      <input class="inputx" name="username" placeholder="admin">
      <label style="margin-top:10px;">비밀번호</label>
      <input class="inputx" type="password" name="password" placeholder="••••••••">
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:12px;">
        <a href="{% url 'site_index' %}" class="btn-home">홈으로</a>
        <button type="submit" class="btn-login">로그인</button>
      </div>
    </form>
  </div>
</body>
</html>
