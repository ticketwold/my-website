<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상담 신청</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 560px;">
    <div class="mb-4">
      <h3 class="fw-bold">빠른 상담 신청</h3>
      <div class="text-muted">간단히 작성하면 빠르게 연락드릴게요.</div>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">{{ form.name }}</div>
          <div class="mb-3">{{ form.phone }}</div>
          <div class="mb-3">{{ form.memo }}</div>
          <div class="form-check mb-3">
            {{ form.privacy_agree }}
            <label class="form-check-label">{{ form.privacy_agree.label }}</label>
          </div>
          <button class="btn btn-dark w-100">신청하기</button>
        </form>
      </div>
    </div>

    <div class="mt-3 small text-muted">
      개인정보는 상담 목적 외 사용되지 않습니다.
    </div>
  </div>
</body>
</html>
